document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ar(--bebas);\n      font-size: 240px;\n      line-height: 0.82;\n      letter-spacing: -0.02em;\n      color: var(--black);\n      margin-left: -6px;\n    }\n\n    #s9 .team-row {\n      display: flex; gap: 0;\n      align-items: stretch;\n    }\n    .ty-team {\n      border: 2px solid rgba(0,0,0,0.2);\n      padding: 28px 48px;\n      display: flex; flex-direction: column; gap: 6px;\n      margin-right: -2px;\n    }\n    .ty-team .tt-name { font-family: var(--bebas); font-size: 44px; color: var(--black); letter-spacing: 0.04em; }\n    .ty-team .tt-id { font-family: var(--mono); font-size: 24px; color: rgba(0,0,0,0.45); letter-spacing: 0.08em; }\n\n    #s9 .bottom-meta {\n      padding: 28px var(--px);\n      border-top: 2px solid rgba(0,0,0,0.15);\n      display: flex; gap: 40px; align-items: center;\n      flex-shrink: 0;\n    }\n    #s9 .bottom-meta span {\n      font-family: var(--mono); font-size: 24px;\n      color: rgba(0,0,0,0.45); letter-spacing: 0.06em;\n    }\n    #s9 .bottom-meta .sep { color: rgba(0,0,0,0.2); }\n  <\u002Fstyle>\n  \n\n<\u002Fhead><body>\n<deck-stage width=\"1920\" height=\"1080\">\n\n  <!-- ═══ SLIDE 1: TITLE ═══ -->\n  <section id=\"s1\" data-label=\"01 Title\">\n    <div class=\"top-bar\">\n      <span class=\"tag\" style=\"font-family:var(--mono);font-size:24px;letter-spacing:0.1em;text-transform:uppercase;color:var(--acid)\">PDE4435 — Robot Systems Integration<\u002Fspan>\n      <span class=\"right\">MSc Robotics · Middlesex University Dubai<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rule-h\"><\u002Fdiv>\n    <div class=\"hero-area\">\n      <div class=\"big-word\">PICKER<span class=\"accent\">-BOT<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"sub-line\">\n      <div style=\"width:4px;height:80px;background:var(--acid);flex-shrink:0;\"><\u002Fdiv>\n      <p class=\"descriptor\">Automated component recovery and custom kit assembly system for educational circuit kits — integrating YOLOv8-OBB detection, planar homography, and TCP/IP robot control via an EPSON VT6-A901S.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"bottom-band\">\n      <div class=\"team-entry\">\n        <span class=\"team-name\">Aman Mishra<\u002Fspan>\n        <span class=\"team-id\">M00983641<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"sep\"><\u002Fdiv>\n      <div class=\"team-entry\">\n        <span class=\"team-name\">Faseeh Mohammed<\u002Fspan>\n        <span class=\"team-id\">M01088120<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"module-info\">\n        PDE4435 Robot Systems Integration<br>\n        MSc Robotics · Middlesex University Dubai\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ SLIDE 2: PROBLEM STATEMENT ═══ -->\n  <section id=\"s2\" data-label=\"02 Problem Statement\">\n    <div class=\"top-bar\">\n      <div>\n        <div style=\"font-family:var(--mono);font-size:24px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;\">02 — Problem Statement<\u002Fdiv>\n        <div class=\"slide-title-sm\" style=\"font-family:var(--bebas);font-size:60px;line-height:1;color:var(--black)\">Background &amp; Goals<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"slide-num\">02<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"body-area\">\n      <div class=\"left-col\">\n        <div class=\"big-stmt\">RETURNED<br>KITS.<br><em>REBUILT.<\u002Fem><\u002Fdiv>\n        <p class=\"stmt-body\">This project aims to solve <strong>the problem of incomplete returned educational circuit kits<\u002Fstrong> that will bring <strong>reduced procurement costs, less e-waste, and project-ready kit assembly<\u002Fstrong> to institutions.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"right-col\">\n        <div class=\"info-row\">\n          <span class=\"ir-label\">Background<\u002Fspan>\n          <p class=\"ir-text\">Students return Arduino/ESP32/LCD kits at term end — <strong>often incomplete.<\u002Fstrong> Institutions accumulate partial kits that cannot be re-issued, driving unnecessary procurement costs and e-waste.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"info-row\">\n          <span class=\"ir-label\">Motivation<\u002Fspan>\n          <p class=\"ir-text\">Industrial kitting systems assume a <strong>uniform supply of new components<\u002Fstrong> — none are designed for recovering loose, mixed parts from depleted kits. A flexible, vision-guided pull model is needed.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"info-row\">\n          <span class=\"ir-label\">Goals<\u002Fspan>\n          <p class=\"ir-text\"><strong>Identify<\u002Fstrong> Arduino, ESP32 &amp; LCD modules via YOLOv8-OBB · <strong>Match<\u002Fstrong> detected inventory to a custom Bill of Quantities (BOQ) · <strong>Assemble<\u002Fstrong> project-specific kits autonomously via EPSON VT6<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ SLIDE 3: SYSTEM ARCHITECTURE ═══ -->\n  <section id=\"s3\" data-label=\"03 System Architecture\">\n    <div class=\"top-bar\">\n      <div class=\"s-title\">SYSTEM<br><span>ARCHITECTURE<\u002Fspan><\u002Fdiv>\n      <div class=\"s-num\">03<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pipeline\">\n      <div class=\"pipe-node\">\n        <div class=\"pn-num\">01<\u002Fdiv>\n        <div class=\"pn-title\">Camera Input<\u002Fdiv>\n        <p class=\"pn-desc\">Live webcam or static image via OpenCV. Input mode and camera index configurable via config.json.<\u002Fp>\n        <span class=\"pn-tech\">OpenCV · Python<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"pipe-node\">\n        <div class=\"pn-num\">02<\u002Fdiv>\n        <div class=\"pn-title\">YOLOv8-OBB Detection<\u002Fdiv>\n        <p class=\"pn-desc\">Custom-trained OBB model detects Arduino, ESP32 &amp; LCD in one pass — centroid, angle, label, confidence.<\u002Fp>\n        <span class=\"pn-tech\">YOLOv8-OBB · Ultralytics<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"pipe-node\">\n        <div class=\"pn-num\">03<\u002Fdiv>\n        <div class=\"pn-title\">BOQ Filter Engine<\u002Fdiv>\n        <p class=\"pn-desc\">Matches detections to a Bill of Quantities. Surplus components ignored; only project-required parts forwarded.<\u002Fp>\n        <span class=\"pn-tech\">Pull Model · Logistics<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"pipe-node\">\n        <div class=\"pn-num\">04<\u002Fdiv>\n        <div class=\"pn-title\">Coordinate Transform<\u002Fdiv>\n        <p class=\"pn-desc\">77-point grid maps pixel centroids to real-world mm coordinates over 200×120mm workspace. Height recalibration via ruler GUI.<\u002Fp>\n        <span class=\"pn-tech\">Homography · NumPy<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"pipe-node\">\n        <div class=\"pn-num\">05<\u002Fdiv>\n        <div class=\"pn-title\">Robot Control<\u002Fdiv>\n        <p class=\"pn-desc\">TCP/IP batch PICK commands to EPSON RC8 SPEL+ server. Jump3 3-phase trajectory: lift → translate → descend, grip, deposit, standby.<\u002Fp>\n        <span class=\"pn-tech\">TCP/IP · EPSON RC8 · SPEL+<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"bottom-bar\">\n      <span class=\"tag\">Python · OpenCV · YOLOv8 · NumPy · TCP/IP · EPSON RC8 · SPEL+<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ SLIDE 4: VISION PIPELINE (AMAN) ═══ -->\n  <section id=\"s4\" data-label=\"04 Vision Pipeline\">\n    <div class=\"layout\">\n      <div class=\"sidebar\">\n        <span class=\"s-tag\">Vision · BOQ Engine · Calibration<\u002Fspan>\n        <div class=\"big-num\">04<\u002Fdiv>\n        <div class=\"slide-label-v\" style=\"color: rgb(228, 226, 0)\">VISION<br>PIPELINE<\u002Fdiv>\n        <div class=\"contrib\">\n          <span class=\"contrib-name\">\n<\u002Fspan>\n          <span class=\"contrib-id\">\n<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"main\">\n        <div class=\"main-header\">\n          <div class=\"main-title\">YOLO &amp;<br><span>BOQ ENGINE<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:var(--mono);font-size:24px;color:var(--muted);text-align:right;line-height:1.6;\">Arduino · ESP32 · LCD<br>Push → Pull Model<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"step-list\">\n          <div class=\"step-row\">\n            <span class=\"step-idx\">1<\u002Fspan>\n            <div class=\"step-content\">\n              <span class=\"sc-title\">Two-Phase Vision Evolution<\u002Fspan>\n              <span class=\"sc-desc\">Phase 1: OpenCV + Teachable Machine. Phase 2: YOLOv8-OBB on custom CVAT dataset with extreme augmentation.<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"step-row\">\n            <span class=\"step-idx\">2<\u002Fspan>\n            <div class=\"step-content\">\n              <span class=\"sc-title\">YOLOv8-OBB Inference<\u002Fspan>\n              <span class=\"sc-desc\">Single forward pass returns <span class=\"sc-code\">(cx, cy, θ)<\u002Fspan> + class (Arduino / ESP32 / LCD). Rotation angle recovered natively — no auxiliary post-processing.<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"step-row\">\n            <span class=\"step-idx\">3<\u002Fspan>\n            <div class=\"step-content\">\n              <span class=\"sc-title\">BOQ Logistics Filter<\u002Fspan>\n              <span class=\"sc-desc\">Detected inventory matched to Bill of Quantities. Surplus components silently ignored — only project-required parts forwarded to coordinate mapping.<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"step-row\">\n            <span class=\"step-idx\">4<\u002Fspan>\n            <div class=\"step-content\">\n              <span class=\"sc-title\">Homography &amp; Robot Dispatch<\u002Fspan>\n              <span class=\"sc-desc\">Pixel centroids transformed via 77-point homography to real-world (x, y) mm coordinates. Batch forwarded to TCP sender for EPSON PICK execution.<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stats-row\">\n          <div class=\"stat-cell\"><span class=\"sv\">\n<\u002Fspan><span class=\"sl\">\n<\u002Fspan><\u002Fdiv>\n          <div class=\"stat-cell\"><span class=\"sv\">\n<\u002Fspan><span class=\"sl\">\n<\u002Fspan><\u002Fdiv>\n          <div class=\"stat-cell\"><span class=\"sv\">\n<\u002Fspan><span class=\"sl\">\n<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ SLIDE 5: ROBOT COMMS (FASEEH) ═══ -->\n  <section id=\"s5\" data-label=\"05 Robot Communication\">\n    <div class=\"layout\">\n      <div class=\"main\">\n        <div class=\"header\">\n          <div class=\"s-title\">ROBOT<br>COMMUNICATION<br>&amp; CONTROL<\u002Fdiv>\n          <div class=\"s-num\">05<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"code-block\">\n          <div class=\"cm\"># sender.py — batch pick sequence<\u002Fdiv>\n          <div><span class=\"fn\">epsonPickAll<\u002Fspan>([(<span class=\"arg\">245.3, 180.7, 360, 42<\u002Fspan>), (<span class=\"arg\">310.1, 95.4, 360, 18<\u002Fspan>)])<\u002Fdiv>\n          <div class=\"cm\">&nbsp;&nbsp;→ JUMP clearance · MOVE (x,y) · GO pick height · GRIP · JUMP tray · RELEASE · STANDBY<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cmd-grid\">\n          <div class=\"cmd-cell\">\n            <span class=\"cc-name\">GO<\u002Fspan>\n            <span class=\"cc-desc\">Linear motion to (x, y, z, u) — precise in-pick movements<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"cmd-cell\">\n            <span class=\"cc-name\">JUMP<\u002Fspan>\n            <span class=\"cc-desc\">Arc traversal with clearance height — safe between positions<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"cmd-cell\">\n            <span class=\"cc-name\">PICK<\u002Fspan>\n            <span class=\"cc-desc\">Full pick-and-deposit sequence for one target location<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"cmd-cell\">\n            <span class=\"cc-name\">STANDBY<\u002Fspan>\n            <span class=\"cc-desc\">Return arm to home position after each batch completes<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"sidebar\">\n        <span class=\"s-tag\">TCP/IP · RC8 · SPEL+<\u002Fspan>\n        <div class=\"big-num\">05<\u002Fdiv>\n        <div class=\"slide-label-v\" style=\"color: rgba(170, 170, 170, 0.667)\">ROBOT<br>CONTROL<\u002Fdiv>\n        <div class=\"contrib\">\n          <span class=\"contrib-name\">\n<\u002Fspan>\n          <span class=\"contrib-id\">\n<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ SLIDE 6: DEMO ═══ -->\n  <section id=\"s6\" data-label=\"06 Live Demo\" style=\"background:#000;padding:0;overflow:hidden;cursor:pointer;\" onclick=\"window.open('https://youtu.be/UVBhKj8TgDQ','_blank')\">\n    <img src=\"a3528cee-5499-48a7-be11-aa134b91191d\" style=\"width:100%;height:100%;object-fit:cover;display:block;opacity:0.75;\" alt=\"Picker-Bot Demo Video\">\n    <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;pointer-events:none;\">\n      <div style=\"width:100px;height:100px;border-radius:50%;background:rgba(228,226,0,0.92);display:flex;align-items:center;justify-content:center;box-shadow:0 0 60px rgba(228,226,0,0.4);\">\n        <svg width=\"42\" height=\"42\" viewBox=\"0 0 42 42\" fill=\"none\"><polygon points=\"16,10 36,21 16,32\" fill=\"#050505\"><\u002Fpolygon><\u002Fsvg>\n      <\u002Fdiv>\n      <div style=\"font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:0.16em;color:rgba(255,255,255,0.7);text-transform:uppercase;\">Click to play in browser<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ SLIDE 7: TESTING ═══ -->\n  <section id=\"s7\" data-label=\"07 Testing &amp; Results\">\n    <div class=\"top-bar\">\n      <div class=\"s-title\">TESTING &amp; RESULTS<\u002Fdiv>\n      <div class=\"s-num\">07<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"metrics-bar\" style=\"border-top:2px solid var(--black);border-bottom:none;margin-top:16px;\">\n      <div class=\"metric-slot\"><span class=\"ms-val\">0.99<\u002Fspan><span class=\"ms-label\">mAP50 — near-perfect localisation &amp; classification<\u002Fspan><\u002Fdiv>\n      <div class=\"metric-slot\"><span class=\"ms-val\">0.7<\u002Fspan><span class=\"ms-label\">Inference confidence threshold in simulation<\u002Fspan><\u002Fdiv>\n      <div class=\"metric-slot\"><span class=\"ms-val\">200×120<\u002Fspan><span class=\"ms-label\">mm calibrated workspace, 77-point homography<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"content\" style=\"display:flex;flex-wrap:wrap;align-content:flex-start;\">\n      <div class=\"col-header pass\">✓ Successes<\u002Fdiv>\n      <div class=\"col-header fail\">✗ Failures &amp; Limitations<\u002Fdiv>\n      <div class=\"result-entry\">\n        <span class=\"re-title\">mAP50 of 0.99 achieved<\u002Fspan>\n        <span class=\"re-desc\">YOLOv8-OBB reached near-perfect detection on Arduino, ESP32 &amp; LCD.<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"result-entry even-col\">\n        <span class=\"re-title\">Simulation only — no physical deployment<\u002Fspan>\n        <span class=\"re-desc\">All results from EPSON RC8.0 simulator. Physical gripper timing, real lighting, and component handling untested.<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"result-entry\">\n        <span class=\"re-title\">BOQ pull model validated<\u002Fspan>\n        <span class=\"re-desc\">Surplus components correctly ignored; only project-required parts picked.<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"result-entry even-col\">\n        <span class=\"re-title\">Planar homography limitation<\u002Fspan>\n        <span class=\"re-desc\">2D model can't account for component height parallax. Tall modules (LCD) introduce lateral error during Jump3 descent.<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"result-entry\">\n        <span class=\"re-title\">Full pipeline in RC8.0 simulation<\u002Fspan>\n        <span class=\"re-desc\">JUMP/GO/PICK/STANDBY command set validated across extended runs. Jump3 trajectory reliable; abort-on-failure confirmed on synthetic faults.<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"result-entry even-col\">\n        <span class=\"re-title\">Fixed inter-command delay<\u002Fspan>\n        <span class=\"re-desc\">Fixed delay doesn't adapt to component mass — LCD settles differently from ESP32, limiting throughput.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ SLIDE 8: CONCLUSION ═══ -->\n  <section id=\"s8\" data-label=\"08 Conclusion &amp; Future Work\">\n    <div class=\"layout\">\n      <div class=\"left\">\n        <span class=\"s-label\" style=\"color: rgb(228, 226, 0)\">08 — Conclusion<\u002Fspan>\n        <div class=\"s-title\">GOALS VS. <span>RESULTS<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:0;\">\n          <div class=\"goal-entry\">\n            <span class=\"goal-tick met\">✓<\u002Fspan>\n            <div class=\"goal-body\">\n              <span class=\"gb-title\">Detection pipeline operational<\u002Fspan>\n              <span class=\"gb-desc\">Single pass returns centroid, angle &amp; class for Arduino/ESP32/LCD and instructs EPSON via TCP.<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"goal-entry\">\n            <span class=\"goal-tick met\">✓<\u002Fspan>\n            <div class=\"goal-body\">\n              <span class=\"gb-title\">Homography calibration working<\u002Fspan>\n              <span class=\"gb-desc\">77-point grid, 200×120mm workspace. Height recalibration via scale factor.<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"goal-entry\">\n            <span class=\"goal-tick met\">✓<\u002Fspan>\n            <div class=\"goal-body\">\n              <span class=\"gb-title\">BOQ pull model validated<\u002Fspan>\n              <span class=\"gb-desc\">Push → Pull model achieved. BOQ engine filters surplus components; only project-specific items picked.<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"goal-entry\">\n            <span class=\"goal-tick partial\">~<\u002Fspan>\n            <div class=\"goal-body\">\n              <span class=\"gb-title\">Robustness under real conditions<\u002Fspan>\n              <span class=\"gb-desc\">All results in EPSON RC8.0 simulation. Physical deployment needs gripper tuning, real lighting &amp; height-aware calibration.<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"right\">\n        <span class=\"r-label\">Future Directions<\u002Fspan>\n        <div class=\"future-entry\">\n          <span class=\"fe-title\">Physical Hardware Deployment<\u002Fspan>\n          <span class=\"fe-desc\">Transition from RC8.0 simulator to real VT6-A901S.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"future-entry\">\n          <span class=\"fe-title\">Web-Based BOQ Portal<\u002Fspan>\n          <span class=\"fe-desc\">Students submit project BOQs online. System queues requests, processes overnight &amp; notifies — fully self-service.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"future-entry\">\n          <span class=\"fe-title\">Depth Sensing &amp; Height-Aware Calibration<\u002Fspan>\n          <span class=\"fe-desc\">Depth camera replaces planar homography for tall components (LCD), eliminating parallax offset.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"future-entry\">\n          <span class=\"fe-title\">IoT + AGV Integration<\u002Fspan>\n          <span class=\"fe-desc\">IoT-guided AGVs fetch bulk bins from storage and deliver assembled kits to collection points.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"reflection-block\">\n          <strong>Reflection —<\u002Fstrong> The move from OpenCV prototype to YOLOv8-OBB was the critical turning point — annotation time traded for a model that absorbed the variability the prototype could never handle.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ SLIDE 9: THANK YOU ═══ -->\n  <section id=\"s9\" data-label=\"09 Thank You\">\n    <div class=\"layout\">\n      <div class=\"top-rule\">\n        <span class=\"tag\">PDE4435 Robot Systems Integration · MSc Robotics · Middlesex University Dubai<\u002Fspan>\n        <span class=\"tag\">2025–2026<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"center\">\n        <div class=\"ty-word\">THANK<br>YOU.<\u002Fdiv>\n        <div class=\"team-row\">\n          <div class=\"ty-team\">\n            <span class=\"tt-name\">Aman Mishra<\u002Fspan>\n            <span class=\"tt-id\">M00983641<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"ty-team\">\n            <span class=\"tt-name\">Faseeh Mohammed<\u002Fspan>\n            <span class=\"tt-id\">M01088120<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"ty-team\" style=\"flex:1;border-left:none;align-items:flex-end;justify-content:center;font-family:var(--bebas);font-size:52px;color:rgba(0,0,0,0.2);letter-spacing:0.04em;\">\n            Q&amp;A\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"bottom-meta\">\n        <span>MSc Robotics<\u002Fspan>\n        <span class=\"sep\">·<\u002Fspan>\n        <span>Middlesex University Dubai<\u002Fspan>\n        <span class=\"sep\">·<\u002Fspan>\n        <span>PDE4435 Robot Systems Integration<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdeck-stage>\n\n\n<\u002Fbody><\u002Fhtml>"
